spring:
  application:
    name: desafio-softdesign-api
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: oracle.jdbc.OracleDriver
    url: ${DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
    username: ${DATASOURCE_USER:desafio}
    password: ${DATASOURCE_PASS:desafioApi}
  liquibase:
    change-log: classpath:db/master.yaml
    contexts: dev, local
    enabled: true

event:
  cron: 0 30 * * * *
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    password: ${RABBITMQ_PASS:guest}
    username: ${RABBITMQ_USER:guest}
    virtualHost: ${RABBITMQ_VHOST:/}
    desafio:
      exchange: desafio.pauta.exchange
      queue: notificacao.pauta.queue
      routing-key: #
